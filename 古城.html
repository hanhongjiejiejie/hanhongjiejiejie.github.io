<script>
// ========== 智谱AI API调用核心代码 ==========
// 替换为你的智谱API Key（从智谱开放平台获取）
const ZHIPU_API_KEY = "14cd0b3789fb4c1ca0809d8f5c26c110.rI6aAkNkO30OJOKE";
const ZHIPU_API_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions";

// DOM元素
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');

// 添加消息到聊天窗口
function addMessage(content, isUser = false) {
  const messageDiv = document.createElement('div');
  messageDiv.className = isUser ? 'message user-message' : 'message ai-message';
  messageDiv.textContent = content;
  chatMessages.appendChild(messageDiv);
  // 滚动到底部
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// 发送消息到智谱API
async function sendMessageToZhipu(message) {
  try {
    // 显示加载状态
    addMessage("正在思考中...", false);
    sendBtn.disabled = true;

    const response = await fetch(ZHIPU_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${ZHIPU_API_KEY}`
      },
      body: JSON.stringify({
        model: "glm-4", // 可选：glm-3-turbo/glm-4
        messages: [
          {
            role: "system",
            content: "你是一名中国传统民居与历史文化名城的专家，回答要专业、简洁、易懂，重点突出文化和建筑特色。"
          },
          {
            role: "user",
            content: message
          }
        ],
        temperature: 0.7,
        max_tokens: 1000
      })
    });

    // 移除加载状态
    chatMessages.removeChild(chatMessages.lastChild);

    if (!response.ok) {
      throw new Error(`API请求失败: ${response.status}`);
    }

    const data = await response.json();
    const answer = data.choices[0].message.content;
    addMessage(answer, false);
    
  } catch (error) {
    console.error("API调用错误:", error);
    addMessage("抱歉，获取回答失败，请稍后再试。", false);
  } finally {
    sendBtn.disabled = false;
  }
}

// 发送按钮点击事件
sendBtn.addEventListener('click', () => {
  const message = chatInput.value.trim();
  if (!message) return;
  
  // 添加用户消息
  addMessage(message, true);
  chatInput.value = '';
  
  // 调用API
  sendMessageToZhipu(message);
});

// 回车发送
chatInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    sendBtn.click();
  }
});

  // 添加标记（根据是否 customIcon 选择图标）
  function addMarkersWithIcon(data, defaultIcon, tulouIcon) {
    data.forEach(item => {
      let iconToUse = defaultIcon;
      if (item.customIcon && item.name === "承启楼") {
        iconToUse = tulouIcon;
      }
      const marker = new AMap.Marker({
        position: [item.longitude, item.latitude],
        icon: iconToUse,
        zIndex: 10,
        title: item.name
      });
      marker.on('click', () => showPopup(item));
      marker.setMap(map);
    });
  }

  // 核密度热力图（基于古城数据）
  function addHeatmap(data) {
    const heatData = data.map(p => ({
      lng: p.longitude,
      lat: p.latitude,
      count: 1
    }));
    const heatmap = new AMap.HeatMap(map, {
      radius: 48,
      opacity: [0.2, 0.85],
      gradient: { 0.2: '#2c7bb6', 0.4: '#abd9e9', 0.6: '#fdae61', 0.8: '#d7191c', 1.0: '#a50026' },
      zIndex: 100
    });
    heatmap.setDataSet({ data: heatData, max: 9 });
    heatmap.show();
  }
