<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配手机端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>承启楼屋檐 - 土楼文化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体样式：古朴风格 */
        body {
            font-family: "Microsoft YaHei", serif;
            background-color: #f8f5e6;
            color: #3d2b1f;
            line-height: 1.8;
            padding: 20px;
        }

        /* 内容容器 */
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #fffaf0;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border-left: 6px solid #9c7c5e;
        }

        /* 标题 */
        h1 {
            text-align: center;
            color: #8b5a2b;
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: bold;
        }

        /* 段落样式 */
        p {
            font-size: 17px;
            text-indent: 2em; /* 首行缩进 */
            margin-bottom: 16px;
        }

        /* 强调文字 */
        .highlight {
            color: #8b4513;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>承启楼屋檐</h1>
        
        <p>承启楼素有 “土楼之王” 美誉，其屋檐为核心特色。外环主屋檐出檐深远，达两米左右，如巨伞般遮蔽厚土墙，有效防雨冲刷，保障楼体百年稳固。内环各层设环形悬挑腰檐，保护木构廊檐，兼具遮阳、通风与储物功能。屋面青瓦随圆弧形铺设，檐口压砖加固，线条简洁圆顺，无繁复雕饰。整体既凸显客家建筑雄浑大气的风貌，又融合防御、排水、生活实用智慧，是土楼营造技艺的经典体现。</p>
        
       
    </div>
</body>
</html>
