<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配手机端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>承启楼祖堂 - 土楼文化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体样式：古朴风格 */
        body {
            font-family: "Microsoft YaHei", serif;
            background-color: #f8f5e6;
            color: #3d2b1f;
            line-height: 1.8;
            padding: 20px;
        }

        /* 内容容器 */
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #fffaf0;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border-left: 6px solid #9c7c5e;
        }

        /* 标题 */
        h1 {
            text-align: center;
            color: #8b5a2b;
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: bold;
        }

        /* 段落样式 */
        p {
            font-size: 17px;
            text-indent: 2em; /* 首行缩进 */
            margin-bottom: 16px;
        }

        /* 强调文字 */
        .highlight {
            color: #8b4513;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>承启楼祖堂</h1>
        
        <p>承启楼祖堂位于全楼圆心核心，是 <span class="highlight">“三圈一中心”</span> 布局的精神内核。为单层殿堂式结构，坐北朝南，庄重古朴。</p>
        
        <p>堂内供奉江氏先祖牌位，存有 <span class="highlight">“笔花庐”</span> 等历代题匾与楠木寿屏等珍贵文物。这里是家族祭祀、议事、婚丧礼仪的中心，承载着 <span class="highlight">“承前祖德，启后孙谋”</span> 的家风。</p>
        
        <p>整体依《易经》八卦而建，与四环同心圆相呼应，既是信仰圣地，也是凝聚全楼 800 族人的精神枢纽。</p>
    </div>
</body>
</html>
